{% extends "layout_base.html" %}
{% block content %}

<h2 class="mb-4">🔧 Ajuste da Ordem dos Grupos da DRE</h2>

<form method="POST">
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Grupo</th>
                <th>Ordem</th>
            </tr>
        </thead>
        <tbody>
            {% for item in ordem_dre %}
            <tr>
                <td>{{ item.grupo }}</td>
                <td>
                    <input type="number" name="ordem_{{ item.grupo }}" value="{{ item.ordem }}" class="form-control" style="width:100px;">
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button type="submit" class="btn btn-success">💾 Salvar Ordem</button>
</form>

{% endblock %}
