{% extends 'layout_base.html' %}

{% block title %}Editar Credencial{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2>Editar Credencial</h2>
  <form action="{{ url_for('edit_credential', cid=cred.id) }}" method="post" class="row g-2 align-items-end">
    <div class="col-md-3">
      <label class="form-label">Conta</label>
      <input name="conta" class="form-control" value="{{ cred.conta }}" required>
    </div>
    <div class="col-md-3">
      <label class="form-label">Link de Acesso</label>
      <input name="link" type="url" class="form-control" value="{{ cred.link }}" required>
    </div>
    <div class="col-md-2">
      <label class="form-label">Login/Usuário</label>
      <input name="usuario" class="form-control" value="{{ cred.usuario }}" required>
    </div>
    <div class="col-md-2">
      <label class="form-label">Senha</label>
      <div class="input-group">
        <input id="editSenha" name="senha" type="password" class="form-control" value="{{ cred.senha }}" required>
        <button type="button" class="btn btn-outline-secondary" onclick="toggleField('editSenha', this)">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>
    <div class="col-md-2">
      <button class="btn btn-success w-100">Salvar</button>
    </div>
  </form>
  <div class="mt-3">
    <a href="{{ url_for('credentials') }}" class="btn btn-outline-secondary">Cancelar</a>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function toggleField(fieldId, btn) {
    const field = document.getElementById(fieldId);
    const icon = btn.querySelector('i');
    if (field.type === 'password') {
      field.type = 'text';
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      field.type = 'password';
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  }
</script>
{% endblock %}
